<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" fill="#0b0b0f"/>

  <!-- Corner marks — manga panel style -->
  <rect x="18" y="18" width="44" height="7" fill="#ff2a38"/>
  <rect x="18" y="18" width="7" height="44" fill="#ff2a38"/>
  <rect x="450" y="18" width="44" height="7" fill="#ff2a38"/>
  <rect x="487" y="18" width="7" height="44" fill="#ff2a38"/>
  <rect x="18" y="487" width="44" height="7" fill="#ff2a38"/>
  <rect x="18" y="450" width="7" height="44" fill="#ff2a38"/>
  <rect x="450" y="487" width="44" height="7" fill="#ff2a38"/>
  <rect x="487" y="450" width="7" height="44" fill="#ff2a38"/>

  <!-- Bold F letterform (constructed from rectangles) -->
  <!-- Vertical stem -->
  <rect x="108" y="92" width="64" height="328" fill="#d8dde8"/>
  <!-- Top bar — white portion -->
  <rect x="108" y="92" width="222" height="62" fill="#d8dde8"/>
  <!-- Top bar — red accent portion -->
  <rect x="330" y="92" width="74" height="62" fill="#ff2a38"/>
  <!-- Mid bar -->
  <rect x="108" y="232" width="190" height="54" fill="#d8dde8"/>

  <!-- Green terminal cursor — bottom right -->
  <rect x="330" y="340" width="90" height="16" fill="#10b981"/>
  <rect x="330" y="372" width="74" height="16" fill="#10b981"/>
  <rect x="330" y="404" width="52" height="16" fill="#10b981"/>
</svg>
