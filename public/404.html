<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SANCTION</title>
    <script>
      // GitHub Pages SPA redirect: send any 404 back to the root so HashRouter handles it.
      window.location.replace(
        window.location.origin +
        window.location.pathname.split('/').slice(0, 2).join('/') +
        '/'
      )
    </script>
  </head>
  <body></body>
</html>
